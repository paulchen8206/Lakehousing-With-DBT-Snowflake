apiVersion: v1
kind: Secret
metadata:
  name: dbt-snowflake-secret
  namespace: lakehouse-dbt
type: Opaque
stringData:
  SNOWFLAKE_ACCOUNT: "xy12345.us-east-1"
  SNOWFLAKE_USER: "DBT_USER"
  SNOWFLAKE_PASSWORD: "replace-me"
  SNOWFLAKE_ROLE: "TRANSFORMER"
  SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
  SNOWFLAKE_DATABASE: "LAKEHOUSE"
  SNOWFLAKE_SCHEMA: "RAW"
  DBT_TARGET: "dev"

# For local dev, prefer generating this secret from LocalStack Secrets Manager:
#   bash scripts/k8s-secret-from-localstack.sh