apiVersion: batch/v1
kind: CronJob
metadata:
  name: dbt-medallion-run
  namespace: lakehouse-dbt
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: dbt-runner
            image: lakehousing-dbt:latest
            imagePullPolicy: IfNotPresent
            command: ["bash", "/scripts/dbt-run.sh"]
            envFrom:
            - secretRef:
                name: dbt-snowflake-secret
            volumeMounts:
            - name: dbt-config
              mountPath: /home/dbt/.dbt/profiles.yml
              subPath: profiles.yml
            - name: dbt-script
              mountPath: /scripts/dbt-run.sh
              subPath: dbt-run.sh
          volumes:
          - name: dbt-config
            configMap:
              name: dbt-config
          - name: dbt-script
            configMap:
              name: dbt-config
              defaultMode: 0755