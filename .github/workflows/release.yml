name: Release
on:
  push:
    tags:
    - "v*.*.*"
permissions:
  contents: write
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lakehousing-dbt
jobs:
  release-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Normalize owner for image path
      id: owner
      run: echo "owner_lc=$(echo \"${GITHUB_REPOSITORY_OWNER}\" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
    - name: Extract Docker metadata for semver release
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
        flavor: |
          latest=false
    - name: Build and push immutable release image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: infrastructure/docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body: |
          Published immutable dbt image tags:
          ${{ steps.meta.outputs.tags }}