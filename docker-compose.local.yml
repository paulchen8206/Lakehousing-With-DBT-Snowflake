services:
  localstack:
    image: localstack/localstack:3.8
    container_name: lakehouse-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=secretsmanager,ssm,sts,iam
      - DEBUG=1
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-raw-local}
    volumes:
      - ./infrastructure/localstack/data:/seed
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$S3_BUCKET || true &&
      mc cp --recursive /seed/orders local/$$S3_BUCKET/orders &&
      mc cp --recursive /seed/customers local/$$S3_BUCKET/customers
      "

  dbt:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    env_file:
      - .env.local
      - .env.local.resolved
    depends_on:
      localstack:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./dbt_project:/opt/dbt
      - ./config/profiles.yml:/home/dbt/.dbt/profiles.yml
    command: >
      dbt deps &&
      dbt debug &&
      dbt run --select bronze silver gold &&
      dbt test

volumes:
  localstack-data:
  minio-data:
